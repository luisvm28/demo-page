trigger:
- main

resources:
- repo: self

variables: # <---------------------- AGREGA LAS VARIABLES
  - group: CICD
  - name: appVersion
    value: $[variables.appVersion]

parameters:
  - name: tag 
    default: '$(Build.BuildId)'
  - name: imageName
    default: 'demo-page'

stages:
- stage: CICD
  displayName: CICD workflow 
  jobs:
  - job: Build
    displayName: Build
    pool: local-agent

    steps:
    - task: Docker@2
      displayName: Build an image
      inputs:
        repository: ${{ parameters.imageName }}
        command: build
        dockerfile: '**/Dockerfile'
        tags: ${{ parameters.tag }}
        arguments: '--build-arg VERSION="$(appVersion)"'
        containerRegistry: registryConnection

    - task: Docker@2
      displayName: Push to ACR
      inputs:
        command: Push
        containerRegistry: registryConnection
        repository: ${{ parameters.imageName }}
        tags: ${{ parameters.tag }}

  - job: Deploy 
    displayname: Deploy 
    dependsOn: Build
    pool: local-agent
    steps:
      - task: AzureContainerApps@1

        inputs:
          azureSubscription: 'appDeployConnection'
          imageToDeploy: acrappsluis.azurecr.io/${{ parameters.imageName }}:${{ parameters.tag }}

          containerAppName: 'app-demo-page' # NOMBRE DEL CONTAINER APP
          resourceGroup: rg-devops

          acrUsername: $(acrUsername)
          acrPassword: $(acrPassword)
          